name: Build CI Image

on:
  push:
    paths:
      - docker/ci.Dockerfile
      - .ci-version
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Get CI Version
        id: version
        run: echo "VERSION=$(cat .ci-version)" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build 
            -t ghcr.io/inpalpra/pyprobe-ci:${{ steps.version.outputs.VERSION }} 
            -f docker/ci.Dockerfile .

      - name: Push image
        run: docker push ghcr.io/inpalpra/pyprobe-ci:${{ steps.version.outputs.VERSION }}
