name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test-wheel:
    runs-on: ubuntu-latest
    container:
      # Use the latest optimized base image
      image: ghcr.io/inpalpra/pyprobe-ci:py3.12-qt6-v2

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        run: uv build --wheel

      - name: Test built wheel
        run: bash scripts/test_artifact.sh wheel
